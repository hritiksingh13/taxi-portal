services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: fleetops-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: apps/backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: fleetops-db
          property: connectionString
      - key: CLIENT_URL
        sync: false
      - key: CUSTOMER_PORTAL_URL
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false

  # ── Frontend Manager Portal ──────────────────────────────────────────────────
  - type: web
    name: fleetops-frontend
    runtime: static
    rootDir: apps/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Customer Portal ──────────────────────────────────────────────────────────
  - type: web
    name: fleetops-customer-portal
    runtime: static
    rootDir: apps/customer-portal
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: fleetops-db
    region: singapore
    plan: free
    databaseName: taxi_fleet_db
    user: fleetops
