services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: naina-tour-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: apps/backend
    # Navigate to monorepo root for npm install (workspace hoisting),
    # then back to backend dir for prisma + build
    buildCommand: >-
      cd ../.. && npm install --include=dev && cd apps/backend &&
      npx prisma generate &&
      npm run build
    startCommand: npx prisma db push --accept-data-loss && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: naina-tour-db
          property: connectionString
      - key: CLIENT_URL
        value: https://naina-tour-frontend.onrender.com
      # SMTP (optional — email features degrade gracefully)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  # ── Frontend Manager Portal ──────────────────────────────────────────────────
  - type: web
    name: naina-tour-frontend
    runtime: static
    rootDir: apps/frontend
    # Navigate to monorepo root for npm install (workspace hoisting),
    # then back to frontend dir for build
    buildCommand: >-
      cd ../.. && npm install --include=dev && cd apps/frontend &&
      npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://naina-tour-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: naina-tour-db
    region: singapore
    plan: free
    databaseName: naina_tour_db
    user: naina_tour
    ipAllowList: []
